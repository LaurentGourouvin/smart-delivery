spring:
  application:
    name: delivery-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smartdelivery?currentSchema=delivery_service
    username: delivery_svc
    password: delivery_svc_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    schemas: delivery_service
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/smartdelivery/protocol/openid-connect/certs

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: delivery-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.smartdelivery.*"
        spring.json.value.default.type: com.smartdelivery.delivery_service.event.PaymentSucceededEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8084

# ── Simulation livraison ────────────────────────────────────
delivery:
  simulation:
    delay-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html